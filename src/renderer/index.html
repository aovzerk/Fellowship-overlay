<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spirit Overlay</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="overlay-root">
    <div id="playersContainer"></div>
    <div id="pullInfo" class="panel pull-panel"></div>
    <div id="recentSkillsPanel" class="panel recent-skills-panel"></div>

    <div id="settingsModal" class="modal-overlay hidden interactive">
      <div class="panel modal-card settings-modal-card">
        <div class="modal-header">
          <div>
            <div id="settingsModalTitle" class="modal-title">Настройки</div>
            <div id="settingsModalSubtitle" class="modal-subtitle">Общие настройки оверлея</div>
          </div>
          <button id="closeSettingsModalBtn" class="danger-btn">×</button>
        </div>
        <div class="modal-body settings-grid">
          <section class="settings-group" id="logSettingsGroup">
            <div class="settings-group-title" id="logSettingsTitle">Лог</div>
            <div class="settings-row">
              <button id="pickFileBtn">Выбрать папку</button>
              <button id="reloadBtn">Обновить</button>
            </div>
            <div id="filePath" class="settings-note">Папка не выбрана</div>
            <div id="watchStatus" class="settings-note">Нет слежения</div>
          </section>

          <section class="settings-group" id="overlaySettingsGroup">
            <div class="settings-group-title" id="overlaySettingsTitle">Оверлей</div>
            <div class="settings-row">
              <button id="toggleLockBtn">Lock/Unlock</button>
              <button id="skillsBtn">Skills</button>
            </div>
            <div class="settings-row settings-row-inline settings-toggle-list">
              <label class="settings-toggle interactive" for="showPartyToggle">
                <input id="showPartyToggle" type="checkbox" checked />
                <span id="showPartyToggleLabel">Показывать группу и кулдауны</span>
              </label>
              <label class="settings-toggle interactive" for="showPullToggle">
                <input id="showPullToggle" type="checkbox" checked />
                <span id="showPullToggleLabel">Показывать информацию по пулам и %</span>
              </label>
              <label class="settings-toggle interactive" for="showRecentSkillsToggle">
                <input id="showRecentSkillsToggle" type="checkbox" checked />
                <span id="showRecentSkillsToggleLabel">Показывать последние скиллы</span>
              </label>
            </div>
            <div class="settings-row settings-row-inline settings-row-field">
              <label class="settings-field interactive" for="recentSkillsLimitInput">
                <span id="recentSkillsLimitLabel">Лимит последних скиллов</span>
                <input id="recentSkillsLimitInput" type="number" min="1" max="20" step="1" value="7" />
              </label>
            </div>
            <div class="settings-row">
              <label class="layout-control interactive" for="recentSkillsLayoutDirectionSelect">
                <span id="recentSkillsLayoutDirectionLabel">Ориентация панели последних скиллов</span>
                <select id="recentSkillsLayoutDirectionSelect">
                  <option value="horizontal">Горизонтально</option>
                  <option value="vertical">Вертикально</option>
                </select>
              </label>
              <label class="layout-control interactive" for="recentSkillsGrowthDirectionSelect">
                <span id="recentSkillsGrowthDirectionLabel">Рост панели последних скиллов</span>
                <select id="recentSkillsGrowthDirectionSelect">
                  <option value="right">Вправо</option>
                  <option value="left">Влево</option>
                </select>
              </label>
            </div>
            <div class="settings-row">
              <div class="size-controls interactive" id="recentSkillsTrackCountControls">
                <button id="recentSkillsTrackCountDownBtn" type="button">-</button>
                <span id="recentSkillsTrackCountValue">3</span>
                <button id="recentSkillsTrackCountUpBtn" type="button">+</button>
              </div>
              <span id="recentSkillsTrackCountLabel" class="settings-note settings-note-inline">Строк</span>
            </div>
            <div class="settings-row settings-row-inline">
              <span id="hudStatus" class="settings-note">HUD active</span>
            </div>
          </section>

          <section class="settings-group" id="appearanceSettingsGroup">
            <div class="settings-group-title" id="appearanceSettingsTitle">Внешний вид</div>
            <label class="language-switcher interactive" id="languageControls" for="languageSelect" title="Language">
              <span id="languageLabel">Язык</span>
              <select id="languageSelect">
                <option value="ru">Русский</option>
                <option value="en">English</option>
              </select>
            </label>
            <div class="settings-row">
              <label class="layout-control interactive" id="layoutDirectionControls" for="layoutDirectionSelect" title="Layout direction">
                <span id="layoutDirectionLabel">Направление</span>
                <select id="layoutDirectionSelect">
                  <option value="vertical">Вертикально</option>
                  <option value="horizontal">Горизонтально</option>
                </select>
              </label>
            </div>
            <div class="settings-row">
              <div class="size-controls interactive" id="frameGapControls" title="Frame gap">
                <button id="frameGapDownBtn" type="button">-</button>
                <span id="frameGapValue">12px</span>
                <button id="frameGapUpBtn" type="button">+</button>
              </div>
              <div class="size-controls interactive" id="iconsPerRowControls" title="Icons per row">
                <button id="iconsPerRowDownBtn" type="button">-</button>
                <span id="iconsPerRowValue">3</span>
                <button id="iconsPerRowUpBtn" type="button">+</button>
              </div>
              <div class="size-controls interactive" id="cardSizeControls" title="Card size">
                <button id="cardSizeDownBtn" type="button">-</button>
                <span id="cardSizeValue">100%</span>
                <button id="cardSizeUpBtn" type="button">+</button>
              </div>
            </div>
            <div class="settings-row">
              <label class="slider-control interactive" id="panelOpacityControls" for="panelOpacitySlider">
                <span id="panelOpacityLabel">Прозрачность подложки</span>
                <input id="panelOpacitySlider" type="range" min="20" max="100" step="1" value="88" />
                <span id="panelOpacityValue">88%</span>
              </label>
            </div>
          </section>

          <section class="settings-group" id="hotkeysSettingsGroup">
            <div class="settings-group-title" id="hotkeysSettingsTitle">Горячие клавиши</div>
            <div class="hotkey-list">
              <div class="hotkey-row">
                <span id="hotkeyToggleInteractionLabel" class="hotkey-label">Переключить режим взаимодействия</span>
                <button type="button" class="hotkey-badge" disabled>F8</button>
              </div>
              <div class="hotkey-row">
                <span id="hotkeyPickLogLabel" class="hotkey-label">Выбрать лог</span>
                <button type="button" class="hotkey-badge" disabled>F9</button>
              </div>
              <div class="hotkey-row">
                <span id="hotkeyToggleVisibilityLabel" class="hotkey-label">Показать или скрыть оверлей</span>
                <button type="button" class="hotkey-badge" disabled>F10</button>
              </div>
              <div class="hotkey-row">
                <span id="hotkeyOpenSettingsLabel" class="hotkey-label">Открыть настройки</span>
                <button type="button" class="hotkey-badge" disabled>F11</button>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div id="skillsModal" class="modal-overlay hidden interactive">
      <div class="panel modal-card">
        <div class="modal-header">
          <div>
            <div id="skillsModalTitle" class="modal-title">Tracked class skills</div>
            <div id="skillsModalSubtitle" class="modal-subtitle">Choose one or more abilities for each class</div>
          </div>
          <button id="closeSkillsModalBtn" class="danger-btn">×</button>
        </div>
        <div class="modal-body">
          <div id="skillsCatalog"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../dist/renderer/modules/constants.js"></script>
  <script src="../../dist/renderer/modules/formatters.js"></script>
  <script src="../../dist/renderer/modules/i18n.js"></script>
  <script src="../../dist/renderer/modules/panels.js"></script>
  <script src="../../dist/renderer/modules/settings-store.js"></script>
  <script src="../../dist/renderer/modules/layout.js"></script>
  <script src="../../dist/renderer/modules/player-cards.js"></script>
  <script src="../../dist/renderer/modules/skills-modal.js"></script>
  <script src="../../dist/renderer/index.js"></script>
</body>
</html>
